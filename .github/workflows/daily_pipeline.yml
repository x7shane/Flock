name: Daily Data Pipeline

on:
  schedule:
    - cron: '30 10 * * 1-5'  # 10:30 UTC = 4:00 PM IST, Monday to Friday
  workflow_dispatch:  # Allow manual triggering

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update-data:
    runs-on: ubuntu-latest
    timeout-minutes: 90  # Safety net — daily incremental runs should finish in ~15 min
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          cd backend
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Smoke-test DB connection
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          cd backend
          python - <<'EOF'
          import asyncio, sys
          async def check():
              from app.db.session import _db_url, _connect_args
              if not _db_url.startswith("postgresql+asyncpg://"):
                  print(f"ERROR: URL rewrite failed — got: {_db_url[:40]}")
                  sys.exit(1)
              print(f"URL OK:          {_db_url[:60]}...")
              print(f"connect_args:    {_connect_args}")
              from sqlalchemy import text
              from app.db.session import async_session_factory
              async with async_session_factory() as s:
                  result = await s.execute(text("SELECT COUNT(*) FROM stocks WHERE is_active = true"))
                  count = result.scalar()
                  print(f"DB OK: {count} active stocks in database")
          asyncio.run(check())
          EOF

      - name: Run data pipeline
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          cd backend
          python -m scripts.run_pipeline