version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: flock-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: flock
      POSTGRES_PASSWORD: flock_password
      POSTGRES_DB: flock_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U flock -d flock_db"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
