# Render Infrastructure-as-Code
# Docs: https://render.com/docs/yaml-spec
#
# Single Web Service — FastAPI serves both the API (/api/v1/*)
# and the frontend static files (/) via StaticFiles mount.
# Database: Neon PostgreSQL (external) — set DATABASE_URL in Render dashboard.

services:
  - type: web
    name: flock-api
    runtime: python
    region: singapore   # Closest to India (Mumbai not available on free tier)
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app.main:app --workers 2 --worker-class uvicorn.workers.UvicornWorker --bind 0.0.0.0:$PORT --timeout 120
    healthCheckPath: /health
    envVars:
      - key: APP_NAME
        value: Flock API
      - key: APP_VERSION
        value: 0.1.0
      - key: DEBUG
        value: "false"
      - key: DATABASE_URL
        sync: false   # Set manually in Render dashboard — never commit secrets
      - key: CORS_ORIGINS
        sync: false   # Set to your Render URL after first deploy, e.g. https://flock-api.onrender.com
      - key: YFINANCE_TIMEOUT
        value: "45"   # Higher timeout for cloud network latency
      - key: MFAPI_TIMEOUT
        value: "20"
      - key: FETCH_RATE_LIMIT
        value: "1.0"  # Conservative rate limit on shared infra
      - key: PYTHON_VERSION
        value: "3.12.0"
